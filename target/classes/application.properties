# ============================================================
# APPLICATION CONFIGURATION
# ============================================================

# The port your server will run on. Access APIs at http://localhost:8080
server.port=8080

# ============================================================
# DATABASE CONFIGURATION
# Change 'root' and 'your_password' to your MySQL credentials.
# Make sure you have created a database named 'finance_db' in MySQL.
# Command to create it: CREATE DATABASE finance_db;
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# SCHEMA INITIALIZATION
# This tells Spring Boot to run schema.sql on startup to create tables.
# 'always' = run every time the app starts.
# The schema uses CREATE TABLE IF NOT EXISTS so it won't fail if tables exist.
# ============================================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ============================================================
# JACKSON (JSON) CONFIGURATION
# This makes dates appear as "2024-01-15" strings instead of long numbers.
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ============================================================
# LOGGING (optional but helpful during development)
# ============================================================
logging.level.org.springframework.jdbc=DEBUG
